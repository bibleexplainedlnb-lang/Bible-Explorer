kind = "web"
previewPath = "/"
title = "Content Site"
version = "1.0.0"
id = "artifacts/nextjs-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18425

[services.development]
run = "pnpm --filter @workspace/nextjs-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nextjs-site", "run", "build" ]
serve = "server"
startCommand = "pnpm --filter @workspace/nextjs-site run start"

[services.env]
PORT = "18425"
